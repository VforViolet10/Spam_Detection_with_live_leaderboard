<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Spam Detection Leaderboard</title>
<style>
body{
font-family:Arial;
padding:40px;
background:#f5f5f5;
}

h1{
text-align:center;
}

table{
width:90%;
margin:auto;
border-collapse:collapse;
background:white;
box-shadow:0 2px 10px rgba(0,0,0,.1);
}

th,td{
padding:15px;
border:1px solid #ddd;
text-align:center;
}

th{
background:#222;
color:white;
}

tr:hover{
background:#f2f2f2;
}
</style>
</head>
<body>

<h1>📊 Spam Detection Challenge Leaderboard</h1>

<table id="leaderboard">
<thead>
<tr>
<th>Rank</th>
<th>Team</th>
<th>Accuracy</th>
<th>Precision</th>
<th>Recall</th>
<th>F1</th>
</tr>
</thead>
<tbody></tbody>
</table>

<script>
fetch('leaderboard.csv')
.then(response=>response.text())
.then(data=>{

let rows=data.trim().split('\n').slice(1)
let tbody=document.querySelector('tbody')

rows.forEach(r=>{
let cols=r.split(',')
let tr=document.createElement('tr')

cols.forEach(c=>{
let td=document.createElement('td')
td.textContent=c
tr.appendChild(td)
})

tbody.appendChild(tr)

})
})
</script>

</body>
</html>
